name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Check asset integrity
        run: node scripts/check-assets.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed local D1 database
        run: npm run db:seed:local

      - name: Start Worker dev server and wait for readiness
        run: |
          npx wrangler dev &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8787/api/health > /dev/null 2>&1; then
              echo "Worker ready"
              break
            fi
            echo "Waiting for Worker... ($i/30)"
            sleep 1
          done

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          CI: true

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check asset integrity
        run: node scripts/check-assets.mjs

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy

      - name: Smoke test production
        run: |
          BASE="https://ozbloom.mihassan.workers.dev"
          echo "Smoke testing $BASE"
          for i in $(seq 1 15); do
            if curl -sf "$BASE/api/health" > /dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            echo "Waiting for deploy to propagate... ($i/15)"
            sleep 2
          done
          echo "=== Health check ==="
          curl -sf "$BASE/api/health" | grep -q '"ok"' || { echo "FAIL: health endpoint"; exit 1; }
          echo "PASS"
          echo "=== Flowers endpoint ==="
          FLOWERS=$(curl -sf "$BASE/api/flowers/random?limit=1")
          echo "$FLOWERS" | grep -q '"flowers"' || { echo "FAIL: flowers endpoint missing flowers key"; exit 1; }
          echo "$FLOWERS" | grep -q '"common_name"' || { echo "FAIL: flower missing common_name"; exit 1; }
          echo "$FLOWERS" | grep -q '"id"' || { echo "FAIL: flower missing id"; exit 1; }
          echo "PASS"
          echo "=== Static assets ==="
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" "$BASE/" || { echo "FAIL: static assets"; exit 1; }
          echo "PASS"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Production e2e
        run: npm run test:e2e:prod
